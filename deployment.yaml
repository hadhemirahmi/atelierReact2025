apiVersion: apps/v1
kind: Deployment
metadata:
  name: mon-deployment  
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mon-app
  template:
    metadata:
      labels:
        app: mon-app
    spec:
      containers:
      - name: mon-container
        image: nginx
        ports:
        - containerPort: 80